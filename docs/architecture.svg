<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">React Reset architecture</title><desc id="desc">A request reaches the edge worker, which returns an inline React application that stores progress locally.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#111827"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/><g font-family="Inter,system-ui,sans-serif" fill="#e5f3ff">
    <text x="54" y="62" font-size="25" font-weight="700">REACT RESET · EDGE ARCHITECTURE</text><text x="54" y="91" fill="#7dd3fc" font-size="14">A zero-origin, self-contained learning application</text>
    <g stroke="#38bdf8" stroke-width="2" fill="#0b1829"><rect x="55" y="150" width="230" height="150" rx="18"/><rect x="365" y="150" width="230" height="150" rx="18"/><rect x="675" y="150" width="230" height="150" rx="18"/><rect x="985" y="150" width="160" height="150" rx="18"/></g>
    <g text-anchor="middle"><text x="170" y="205" font-size="28">Browser</text><text x="170" y="238" fill="#94a3b8" font-size="14">Authenticated learner</text><text x="480" y="205" font-size="25">Sites Edge Worker</text><text x="480" y="238" fill="#94a3b8" font-size="14">Immediate HTML response</text><text x="790" y="205" font-size="27">React SPA</text><text x="790" y="238" fill="#94a3b8" font-size="14">45 lessons · quizzes · UI</text><text x="1065" y="205" font-size="23">localStorage</text><text x="1065" y="238" fill="#94a3b8" font-size="14">Private progress</text></g>
    <g stroke="#22d3ee" stroke-width="4" fill="none" filter="url(#glow)"><path d="M285 225h70"/><path d="M595 225h70"/><path d="M905 225h70"/></g><g fill="#22d3ee"><path d="m355 225-13-8v16z"/><path d="m665 225-13-8v16z"/><path d="m975 225-13-8v16z"/></g>
    <text x="600" y="362" text-anchor="middle" fill="#a7f3d0" font-size="16">No Node server · No database round-trip · No SSR storage access · Client-side routing survives deep links</text>
  </g>
</svg>
